<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Calculadora de Precios — Kawaii Squishy & Konnichiwa</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0f0f12;
    --surface: #18181e;
    --surface2: #22222a;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0eff5;
    --muted: #8a8996;
    --accent-pink: #ff6eb4;
    --accent-purple: #9b7ff4;
    --accent-green: #5ef0a0;
    --accent-amber: #ffc84a;
    --accent-blue: #60b8ff;
    --font-display: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --radius: 14px;
    --radius-sm: 8px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }
  /* Background decoration */
  body::before {
    content: '';
    position: fixed;
    top: -200px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(155,127,244,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -200px; left: -200px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(255,110,180,0.10) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  .container { max-width: 820px; margin: 0 auto; position: relative; z-index: 1; }

  /* Header */
  header { margin-bottom: 2.5rem; }
  .header-top { display: flex; align-items: center; gap: 14px; margin-bottom: 6px; }
  .logo-mark {
    width: 42px; height: 42px; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple));
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  h1 { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
  .subtitle { font-size: 13px; color: var(--muted); margin-left: 56px; }

  /* Tabs */
  .tab-row { display: flex; gap: 6px; margin-bottom: 1.5rem; }
  .tab {
    padding: 8px 20px; border-radius: 30px;
    border: 1px solid var(--border2);
    background: transparent; color: var(--muted);
    font-family: var(--font-body); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
  }
  .tab:hover { color: var(--text); border-color: rgba(255,255,255,0.25); }
  .tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  /* Panels */
  .panel { display: none; }
  .panel.active { display: block; }

  /* Currency toggle */
  .currency-toggle { display: flex; gap: 6px; margin-bottom: 1.2rem; }
  .cur-btn {
    padding: 6px 16px; border-radius: 30px;
    border: 1px solid var(--border2);
    background: transparent; color: var(--muted);
    font-family: var(--font-body); font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
  }
  .cur-btn.active-rmb { background: rgba(155,127,244,0.2); color: var(--accent-purple); border-color: var(--accent-purple); }
  .cur-btn.active-usd { background: rgba(94,240,160,0.15); color: var(--accent-green); border-color: var(--accent-green); }

  /* Info pill */
  .info-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 30px; font-size: 12px; margin-bottom: 1.2rem;
  }
  .info-pill.rmb { background: rgba(155,127,244,0.12); color: var(--accent-purple); border: 1px solid rgba(155,127,244,0.25); }
  .info-pill.usd { background: rgba(94,240,160,0.10); color: var(--accent-green); border: 1px solid rgba(94,240,160,0.2); }

  /* Input grid */
  .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.2rem; }
  .input-group { display: flex; flex-direction: column; gap: 5px; }
  .input-group.full { grid-column: span 2; }
  .input-group label { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; }
  .input-group input {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 12px;
    color: var(--text); font-family: var(--font-body); font-size: 14px;
    transition: border-color 0.2s; width: 100%;
  }
  .input-group input:focus { outline: none; border-color: var(--accent-purple); }
  .input-group input::placeholder { color: var(--muted); }

  /* Slider section */
  .slider-section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1.1rem 1.2rem; margin-bottom: 1.2rem;
  }
  .slider-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1rem; }
  .slider-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .slider-row:last-child { margin-bottom: 0; }
  .slider-label { font-size: 12px; color: var(--muted); width: 90px; flex-shrink: 0; }
  input[type=range] {
    flex: 1; -webkit-appearance: none; height: 4px;
    background: var(--surface2); border-radius: 2px; outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px;
    border-radius: 50%; background: var(--accent-purple); cursor: pointer;
    border: 2px solid var(--bg);
  }
  .slider-val { font-size: 13px; font-weight: 500; color: var(--text); min-width: 44px; text-align: right; }

  /* Result cards */
  .result-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.2rem; }
  .rcard {
    border-radius: var(--radius); padding: 1rem 1.1rem;
    border: 1px solid var(--border);
  }
  .rcard.cost { background: rgba(255,255,255,0.03); }
  .rcard.mayor { background: rgba(96,184,255,0.07); border-color: rgba(96,184,255,0.2); }
  .rcard.detalle { background: rgba(255,110,180,0.07); border-color: rgba(255,110,180,0.2); }
  .rcard-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .rcard.mayor .rcard-label { color: var(--accent-blue); }
  .rcard.detalle .rcard-label { color: var(--accent-pink); }
  .rcard-value { font-family: var(--font-display); font-size: 1.4rem; font-weight: 700; color: var(--text); }
  .rcard.mayor .rcard-value { color: var(--accent-blue); }
  .rcard.detalle .rcard-value { color: var(--accent-pink); }
  .rcard-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* Save button */
  .btn-save {
    width: 100%; padding: 12px;
    border-radius: var(--radius-sm); border: none;
    background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
    color: #fff; font-family: var(--font-display); font-size: 14px; font-weight: 600;
    cursor: pointer; letter-spacing: 0.02em; transition: opacity 0.2s;
  }
  .btn-save:hover { opacity: 0.88; }

  /* Divider */
  .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

  /* Summary bar */
  .summary-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.2rem; }
  .sbar {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 0.75rem 1rem;
  }
  .sbar-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .sbar-val { font-family: var(--font-display); font-size: 1.3rem; font-weight: 700; }

  /* Search */
  .search-wrap { margin-bottom: 1rem; }
  .search-wrap input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 14px;
    color: var(--text); font-family: var(--font-body); font-size: 13px;
  }
  .search-wrap input:focus { outline: none; border-color: var(--accent-purple); }
  .search-wrap input::placeholder { color: var(--muted); }

  /* Filter row */
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.2rem; }
  .filt {
    padding: 4px 12px; border-radius: 20px;
    border: 1px solid var(--border2); background: transparent;
    color: var(--muted); font-size: 12px; cursor: pointer; transition: all 0.2s;
  }
  .filt.active { background: rgba(155,127,244,0.15); color: var(--accent-purple); border-color: var(--accent-purple); }

  /* Product cards */
  .prod-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1rem 1.2rem; margin-bottom: 0.85rem;
    transition: border-color 0.2s;
  }
  .prod-card:hover { border-color: var(--border2); }
  .prod-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .prod-name { font-family: var(--font-display); font-size: 15px; font-weight: 600; }
  .prod-date { font-size: 11px; color: var(--muted); }
  .prod-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .pill {
    font-size: 11px; font-weight: 500; padding: 2px 9px;
    border-radius: 20px; border: 1px solid transparent;
  }
  .pill-rmb { background: rgba(155,127,244,0.12); color: var(--accent-purple); border-color: rgba(155,127,244,0.25); }
  .pill-usd { background: rgba(94,240,160,0.10); color: var(--accent-green); border-color: rgba(94,240,160,0.2); }
  .pill-cat { background: rgba(255,255,255,0.05); color: var(--muted); border-color: var(--border); }
  .prod-nums { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
  .num-box { background: var(--surface2); border-radius: var(--radius-sm); padding: 6px 10px; }
  .num-label { font-size: 10px; color: var(--muted); margin-bottom: 2px; }
  .num-val { font-family: var(--font-display); font-size: 13px; font-weight: 600; }
  .num-val.cost-c { color: var(--muted); }
  .num-val.mayor-c { color: var(--accent-blue); }
  .num-val.detalle-c { color: var(--accent-pink); }
  .prod-actions { display: flex; gap: 8px; }
  .btn-load {
    padding: 5px 14px; border-radius: 20px;
    border: 1px solid rgba(155,127,244,0.4); background: transparent;
    color: var(--accent-purple); font-size: 12px; cursor: pointer; transition: all 0.2s;
  }
  .btn-load:hover { background: rgba(155,127,244,0.12); }
  .btn-del {
    padding: 5px 14px; border-radius: 20px;
    border: 1px solid var(--border); background: transparent;
    color: var(--muted); font-size: 12px; cursor: pointer; transition: all 0.2s;
  }
  .btn-del:hover { border-color: rgba(255,100,100,0.4); color: #ff6b6b; background: rgba(255,100,100,0.07); }

  /* Empty state */
  .empty { text-align: center; padding: 3rem 0; color: var(--muted); font-size: 13px; line-height: 1.8; }
  .empty-icon { font-size: 2rem; margin-bottom: 0.5rem; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: var(--bg);
    padding: 9px 20px; border-radius: 30px; font-size: 13px; font-weight: 500;
    opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  /* Responsive */
  @media(max-width:560px){
    .result-grid { grid-template-columns: 1fr; }
    .input-grid { grid-template-columns: 1fr; }
    .input-group.full { grid-column: span 1; }
    .prod-nums { grid-template-columns: 1fr 1fr 1fr; }
    .summary-bar { grid-template-columns: 1fr 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-top">
      <div class="logo-mark">✦</div>
      <h1>Calculadora de Precios</h1>
    </div>
    <div class="subtitle">Kawaii Squishy &amp; Konnichiwa · Honduras</div>
  </header>

  <div class="tab-row">
    <button class="tab active" onclick="switchTab('calc',this)">Calculadora</button>
    <button class="tab" onclick="switchTab('hist',this)">Historial</button>
  </div>

  <!-- CALCULADORA -->
  <div class="panel active" id="panel-calc">
    <div class="currency-toggle">
      <button class="cur-btn active-rmb" id="btn-rmb" onclick="switchCurrency('rmb')">¥ RMB</button>
      <button class="cur-btn" id="btn-usd" onclick="switchCurrency('usd')">$ USD</button>
    </div>

    <div id="rmb-block">
      <div class="info-pill rmb">✦ Fórmula: RMB × 5.5 = Landed cost en HNL</div>
      <div class="input-grid">
        <div class="input-group full">
          <label>Nombre del producto</label>
          <input type="text" id="rmb-nombre" placeholder="Ej: Tarjetas Naruto LOMO"/>
        </div>
        <div class="input-group">
          <label>Precio unitario (¥ RMB)</label>
          <input type="number" id="rmb-precio" value="3.10" step="0.01" oninput="renderCurrent()"/>
        </div>
        <div class="input-group">
          <label>Categoría</label>
          <input type="text" id="rmb-cat" placeholder="Ej: Tarjetas, Figuras..."/>
        </div>
      </div>
    </div>

    <div id="usd-block" style="display:none;">
      <div class="info-pill usd">✦ Fórmula: USD × cambio × factor = Landed cost en HNL</div>
      <div class="input-grid">
        <div class="input-group full">
          <label>Nombre del producto</label>
          <input type="text" id="usd-nombre" placeholder="Ej: Funko Pop Spider-Man"/>
        </div>
        <div class="input-group">
          <label>Precio unitario ($ USD)</label>
          <input type="number" id="usd-precio" value="5.00" step="0.01" oninput="renderCurrent()"/>
        </div>
        <div class="input-group">
          <label>Tipo de cambio (L / $1 USD)</label>
          <input type="number" id="usd-cambio" value="26.70" step="0.01" oninput="renderCurrent()"/>
        </div>
        <div class="input-group">
          <label>Factor landed USD</label>
          <input type="number" id="usd-factor" value="1.38" step="0.01" oninput="renderCurrent()"/>
        </div>
        <div class="input-group">
          <label>Categoría</label>
          <input type="text" id="usd-cat" placeholder="Ej: Figuras, Peluches..."/>
        </div>
      </div>
    </div>

    <div class="slider-section">
      <div class="slider-title">Márgenes de ganancia</div>
      <div class="slider-row">
        <span class="slider-label">Mayoreo (%)</span>
        <input type="range" id="sl-mayor" min="50" max="300" step="5" value="150" oninput="renderCurrent()">
        <span class="slider-val" id="val-mayor">150%</span>
      </div>
      <div class="slider-row">
        <span class="slider-label">Detalle (%)</span>
        <input type="range" id="sl-detalle" min="100" max="500" step="10" value="200" oninput="renderCurrent()">
        <span class="slider-val" id="val-detalle">200%</span>
      </div>
    </div>

    <div class="result-grid" id="result-cards"></div>
    <button class="btn-save" onclick="saveProduct()">Guardar en historial →</button>
  </div>

  <!-- HISTORIAL -->
  <div class="panel" id="panel-hist">
    <div class="summary-bar" id="summary-bar"></div>
    <div class="search-wrap">
      <input type="text" id="hist-search" placeholder="Buscar producto..." oninput="renderHist()"/>
    </div>
    <div class="filter-row" id="filter-row"></div>
    <div id="hist-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let currency = 'rmb';
let products = [];
let activeFilter = 'all';
const STORAGE_KEY = 'kawaii_productos_v1';

function round5(n){ return Math.ceil(n/5)*5; }
function fmt(n){ return 'L '+n.toLocaleString('es',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function today(){ return new Date().toLocaleDateString('es-HN',{day:'2-digit',month:'short',year:'numeric'}); }

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

function switchTab(tab, el){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-row .tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  el.classList.add('active');
  if(tab==='hist') renderHist();
}

function switchCurrency(c){
  currency = c;
  document.getElementById('rmb-block').style.display = c==='rmb'?'block':'none';
  document.getElementById('usd-block').style.display = c==='usd'?'block':'none';
  document.getElementById('btn-rmb').className = 'cur-btn'+(c==='rmb'?' active-rmb':'');
  document.getElementById('btn-usd').className = 'cur-btn'+(c==='usd'?' active-usd':'');
  renderCurrent();
}

function getLanded(){
  if(currency==='rmb'){
    return (parseFloat(document.getElementById('rmb-precio').value)||0)*5.5;
  } else {
    const p = parseFloat(document.getElementById('usd-precio').value)||0;
    const c = parseFloat(document.getElementById('usd-cambio').value)||26.7;
    const f = parseFloat(document.getElementById('usd-factor').value)||1.38;
    return p*c*f;
  }
}

function renderCurrent(){
  const pMayor = parseInt(document.getElementById('sl-mayor').value);
  const pDetalle = parseInt(document.getElementById('sl-detalle').value);
  document.getElementById('val-mayor').textContent = pMayor+'%';
  document.getElementById('val-detalle').textContent = pDetalle+'%';
  const landed = getLanded();
  const mayor = round5(landed*(1+pMayor/100));
  const detalle = round5(landed*(1+pDetalle/100));
  document.getElementById('result-cards').innerHTML = `
    <div class="rcard cost">
      <div class="rcard-label">Landed cost</div>
      <div class="rcard-value">${fmt(landed)}</div>
      <div class="rcard-sub">${currency==='rmb'?'RMB × 5.5':'USD × cambio × factor'}</div>
    </div>
    <div class="rcard mayor">
      <div class="rcard-label">Precio mayoreo</div>
      <div class="rcard-value">${fmt(mayor)}</div>
      <div class="rcard-sub">Ganancia ${fmt(mayor-landed)} · +${pMayor}%</div>
    </div>
    <div class="rcard detalle">
      <div class="rcard-label">Precio detalle</div>
      <div class="rcard-value">${fmt(detalle)}</div>
      <div class="rcard-sub">Ganancia ${fmt(detalle-landed)} · +${pDetalle}%</div>
    </div>
  `;
}

function saveProduct(){
  const nombre = currency==='rmb'
    ? document.getElementById('rmb-nombre').value.trim()
    : document.getElementById('usd-nombre').value.trim();
  if(!nombre){ showToast('Ingresá el nombre del producto'); return; }
  const cat = (currency==='rmb'
    ? document.getElementById('rmb-cat').value.trim()
    : document.getElementById('usd-cat').value.trim()) || 'General';
  const landed = getLanded();
  const pMayor = parseInt(document.getElementById('sl-mayor').value);
  const pDetalle = parseInt(document.getElementById('sl-detalle').value);
  const mayor = round5(landed*(1+pMayor/100));
  const detalle = round5(landed*(1+pDetalle/100));
  let precioOrig = '';
  if(currency==='rmb'){
    precioOrig = '¥'+document.getElementById('rmb-precio').value;
  } else {
    precioOrig = '$'+document.getElementById('usd-precio').value+' (L'+parseFloat(document.getElementById('usd-cambio').value).toFixed(2)+'/USD)';
  }
  const prod = {
    id: Date.now(), nombre, cat,
    moneda: currency==='rmb'?'RMB':'USD',
    precioOrig,
    landed: parseFloat(landed.toFixed(2)),
    mayor: parseFloat(mayor.toFixed(2)),
    detalle: parseFloat(detalle.toFixed(2)),
    margenMayor: pMayor, margenDetalle: pDetalle,
    fecha: today()
  };
  loadProducts();
  products.push(prod);
  saveProducts();
  showToast('✓ Producto guardado');
}

function loadProducts(){
  try { products = JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); } catch(e){ products=[]; }
}
function saveProducts(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
}

function deleteProduct(id){
  loadProducts();
  products = products.filter(p=>p.id!==id);
  saveProducts();
  showToast('Producto eliminado');
  renderHist();
}

function loadIntoCalc(p){
  switchTab('calc', document.querySelector('.tab-row .tab'));
  switchCurrency(p.moneda==='RMB'?'rmb':'usd');
  if(p.moneda==='RMB'){
    document.getElementById('rmb-nombre').value = p.nombre;
    document.getElementById('rmb-cat').value = p.cat;
    document.getElementById('rmb-precio').value = (p.landed/5.5).toFixed(2);
  } else {
    document.getElementById('usd-nombre').value = p.nombre;
    document.getElementById('usd-cat').value = p.cat;
  }
  document.getElementById('sl-mayor').value = p.margenMayor;
  document.getElementById('sl-detalle').value = p.margenDetalle;
  renderCurrent();
  showToast('Producto cargado en calculadora');
}

function setFilter(cat, el){
  activeFilter = cat;
  document.querySelectorAll('.filt').forEach(f=>f.classList.remove('active'));
  el.classList.add('active');
  renderHist();
}

function renderHist(){
  loadProducts();
  const q = document.getElementById('hist-search').value.toLowerCase();
  const filtered = products.filter(p=>{
    const cm = activeFilter==='all'||p.cat===activeFilter;
    const sm = p.nombre.toLowerCase().includes(q)||p.cat.toLowerCase().includes(q);
    return cm&&sm;
  });

  document.getElementById('summary-bar').innerHTML = `
    <div class="sbar"><div class="sbar-label">Guardados</div><div class="sbar-val">${products.length}</div></div>
    <div class="sbar"><div class="sbar-label">Categorías</div><div class="sbar-val">${[...new Set(products.map(p=>p.cat))].length}</div></div>
    <div class="sbar"><div class="sbar-label">Mostrando</div><div class="sbar-val">${filtered.length}</div></div>
  `;

  const cats = ['all',...new Set(products.map(p=>p.cat))];
  document.getElementById('filter-row').innerHTML = cats.map(c=>`
    <button class="filt ${activeFilter===c?'active':''}" onclick="setFilter('${c}',this)">${c==='all'?'Todos':c}</button>
  `).join('');

  const list = document.getElementById('hist-list');
  if(filtered.length===0){
    list.innerHTML = `<div class="empty"><div class="empty-icon">✦</div>No hay productos guardados aún.<br>Calculá un precio y guardalo con el botón de abajo.</div>`;
    return;
  }
  list.innerHTML = [...filtered].reverse().map(p=>`
    <div class="prod-card">
      <div class="prod-top">
        <div class="prod-name">${p.nombre}</div>
        <div class="prod-date">${p.fecha}</div>
      </div>
      <div class="prod-pills">
        <span class="pill ${p.moneda==='RMB'?'pill-rmb':'pill-usd'}">${p.moneda} · ${p.precioOrig}</span>
        <span class="pill pill-cat">${p.cat}</span>
      </div>
      <div class="prod-nums">
        <div class="num-box"><div class="num-label">Landed</div><div class="num-val cost-c">${fmt(p.landed)}</div></div>
        <div class="num-box"><div class="num-label">Mayoreo +${p.margenMayor}%</div><div class="num-val mayor-c">${fmt(p.mayor)}</div></div>
        <div class="num-box"><div class="num-label">Detalle +${p.margenDetalle}%</div><div class="num-val detalle-c">${fmt(p.detalle)}</div></div>
      </div>
      <div class="prod-actions">
        <button class="btn-load" onclick='loadIntoCalc(${JSON.stringify(p).replace(/'/g,"&#39;")})'>Cargar →</button>
        <button class="btn-del" onclick="deleteProduct(${p.id})">Eliminar</button>
      </div>
    </div>
  `).join('');
}

renderCurrent();
renderHist();
</script>
</body>
</html>
